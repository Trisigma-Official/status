title: Trisigma Status
buildFuture: true
languageCode: en
defaultContentLanguage: en
baseURL: https://status.trisigma.io

enableGitInfo: false

params:
  categories:
    - name: Trisigma Enterprise
    - name: Trisigma Essential

  systems:
    - name: Splitter
      description: Traffic splitting service.
      category: Trisigma Enterprise
    - name: Configurator
      description: Experiment configuration service.
      category: Trisigma Enterprise
    - name: Compute
      description: Computation and processing service.
      category: Trisigma Enterprise
    - name: Estimate
      description: Estimation service.
      category: Trisigma Essential

  enableUptimeHistogram: true
  monitorBot: false

  dateFormat: January 2, 2006 at 3:04 PM
  shortDateFormat: 15:04 — Jan 2
  useRelativeTime: true
  skipSeconds: false
  enableLastMod: true
  useLargeHeaderDesign: false
  incidentHistoryFormat: "yearly"
  disableIncidentHistory: false
  disableDarkMode: false
  useLogo: false
  description: We continuously monitor the status of our services and if there are any interruptions, a note will be posted here.
  disableComplexCalculations: false
  incidentPostsPerPage: 10
  enableCustomHTML: true

  brand: "#0a0c0f"
  ok: "#008000"
  disrupted: "#cc4400"
  down: "#e60000"
  notice: "#24478f"
  alwaysKeepBrandColor: true
  headerTextColor: white

theme: cstate

preserveTaxonomyNames: true

taxonomies:
  affected: affected

outputs:
  page:
    - html
    - json
  section:
    - html
    - json
    - rss
  home:
    - html
    - json
    - rss
    - svg
  term:
    - html
    - json
    - rss
    - svg

outputFormats:
  svg:
    isPlainText: true
    mediaType: image/svg+xml
